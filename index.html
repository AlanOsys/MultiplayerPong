<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squares</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  h1 {
    font-size: 22px;
    letter-spacing: 8px;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 380px;
  }

  .card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 18px 20px;
    width: 100%;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  #my-code {
    font-size: 28px;
    letter-spacing: 6px;
    color: #4eff91;
    text-align: center;
    cursor: pointer;
    user-select: all;
    padding: 10px;
    background: #0a0a0a;
    border: 1px solid #1e1e1e;
    border-radius: 6px;
    transition: border-color 0.15s;
  }
  #my-code:hover { border-color: #4eff91; }
  .hint { font-size: 11px; color: #444; text-align: center; margin-top: 7px; }
  .join-row { display: flex; gap: 8px; }
  .name-row { display: flex; gap: 8px; margin-bottom: 12px; }

  input[type="text"] {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid #1e1e1e;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    color: #fff;
    font-family: 'Courier New', monospace;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #444; }
  #code-input { font-size: 20px; letter-spacing: 4px; text-transform: uppercase; }

  button {
    background: transparent;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #ccc;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  button:hover:not(:disabled) { background: #1a1a1a; border-color: #555; }
  button:disabled { opacity: 0.3; cursor: default; }

  #status {
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    min-height: 16px;
    text-align: center;
  }

  #arena { display: none; flex-direction: column; align-items: center; gap: 8px; }

  #top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 700px;
    font-size: 11px;
    color: #444;
    letter-spacing: 1px;
  }

  canvas {
    display: block;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    width: 700px;
    align-items: center;
  }

  .hud-player {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 200px;
  }

  .hud-player.right { align-items: flex-end; }

  .hud-name {
    font-size: 11px;
    letter-spacing: 1px;
  }

  .hp-track {
    width: 100%;
    height: 6px;
    background: #1a1a1a;
    border-radius: 3px;
    overflow: hidden;
  }

  .hp-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.1s;
  }

  .hp-text {
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
  }

  #controls-hint { font-size: 11px; color: #2a2a2a; letter-spacing: 1px; }

  #disconnect-btn {
    background: none; border: none; color: #444; cursor: pointer;
    font-family: 'Courier New', monospace; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase; padding: 0;
    flex: none;
  }
  #disconnect-btn:hover { color: #888; }

  #overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.75);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border-radius: 4px;
  }

  #overlay.show { display: flex; }

  #overlay-title {
    font-size: 28px;
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  #overlay-sub { font-size: 12px; color: #666; letter-spacing: 2px; }

  #rematch-btn {
    border-color: #4eff91;
    color: #4eff91;
    padding: 10px 28px;
    font-size: 12px;
  }
  #rematch-btn:hover { background: #0a2016; }

  .canvas-wrap { position: relative; }
</style>
</head>
<body>

<h1>Squares</h1>

<div id="lobby">
  <div class="card">
    <div class="card-label">Your code — share with friend</div>
    <div id="my-code">···</div>
    <p class="hint">Click to copy</p>
  </div>
  <div class="card">
    <div class="card-label">Your name</div>
    <div class="name-row">
      <input type="text" id="name-input" placeholder="Player 1" maxlength="12" />
    </div>
    <div class="card-label">Join friend</div>
    <div class="join-row">
      <input type="text" id="code-input" placeholder="ENTER CODE" maxlength="6" />
      <button id="join-btn" disabled>Connect</button>
    </div>
  </div>
  <div id="status">Connecting to network…</div>
</div>

<div id="arena">
  <div id="top-bar">
    <span></span>
    <button id="disconnect-btn">Disconnect</button>
  </div>

  <div id="hud">
    <div class="hud-player left">
      <div class="hud-name" id="hud-name-me">You</div>
      <div class="hp-track"><div class="hp-fill" id="hp-fill-me"></div></div>
      <div class="hp-text" id="hp-text-me">100 HP</div>
    </div>
    <div style="font-size:11px;color:#2a2a2a;letter-spacing:1px;">VS</div>
    <div class="hud-player right">
      <div class="hud-name" id="hud-name-them">Opponent</div>
      <div class="hp-track"><div class="hp-fill" id="hp-fill-them"></div></div>
      <div class="hp-text" id="hp-text-them">100 HP</div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas" width="700" height="500"></canvas>
    <div id="overlay">
      <div id="overlay-title">···</div>
      <div id="overlay-sub">···</div>
      <button id="rematch-btn">Rematch</button>
    </div>
  </div>

  <div id="controls-hint">WASD / arrows — move &nbsp;·&nbsp; left click / space — shoot &nbsp;·&nbsp; right click — melee &nbsp;·&nbsp; shift — dash</div>
</div>

<script>
const W = 700, H = 500, SQ = 28, SPEED = 3;
const BULLET_SPEED = 7, BULLET_R = 4, BULLET_DMG = 10;
const FIRE_COOLDOWN = 400;
const DASH_DIST = 120, DASH_COOLDOWN = 1000;
const MELEE_RANGE = 55, MELEE_ARC = Math.PI * 0.65, MELEE_DMG = 25, MELEE_COOLDOWN = 500, MELEE_FRAMES = 10;
const MAX_HP = 100;

const COLORS = ['#4eff91', '#4eb8ff', '#ff4e91', '#ffd04e', '#c04eff', '#ff884e'];

let peer, conn;
let myColor, theirColor, myName, theirName;
let inGame = false;
let keys = {};
let animFrame, lastSend = 0, lastFire = 0;
let lastDash = 0, lastMelee = 0;
let mouse = { x: W / 2, y: H / 2 };

// Dash ghost trail
let dashTrails = []; // { x, y, alpha }

// Melee swings: { cx, cy, angle, frame }
let mySwings    = [];
let theirSwings = [];
let mySwingHit  = false; // prevent multi-hit per swing

let me    = { x: 80, y: H/2 - SQ/2, hp: MAX_HP };
let them  = { x: W - 80 - SQ, y: H/2 - SQ/2, hp: MAX_HP };

// Bullets: mine (I fire, I move them, I detect if they hit opponent and send hit msg)
// theirBullets: they fired, they sent positions to me, I just render
let myBullets    = []; // { x, y, vx, vy, id }
let theirBullets = []; // { x, y, vx, vy, id }
let bulletIdCounter = 0;

// Flashing on hit
let myFlash = 0, theirFlash = 0;

// Rematch state: track if both want rematch
let wantsRematch = false, theyWantRematch = false;

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ── PeerJS ────────────────────────────────────────────────

function makeCode() {
  return Math.random().toString(36).substr(2, 6).toUpperCase();
}

peer = new Peer(makeCode(), {
  config: { iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:global.stun.twilio.com:3478' }
  ]}
});

peer.on('open', id => {
  document.getElementById('my-code').textContent = id;
  document.getElementById('join-btn').disabled = false;
  setStatus("Ready — share your code or enter a friend's");
});

peer.on('error', e => setStatus('Error: ' + e.type));

peer.on('connection', c => {
  conn = c;
  myColor    = COLORS[0];
  theirColor = COLORS[1];
  setupConn(true);
});

document.getElementById('join-btn').addEventListener('click', () => {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  if (!code) return;
  setStatus('Connecting to ' + code + '…');
  document.getElementById('join-btn').disabled = true;
  conn = peer.connect(code, { reliable: false, serialization: 'json' });
  myColor    = COLORS[1];
  theirColor = COLORS[0];
  setupConn(false);
});

document.getElementById('my-code').addEventListener('click', () => {
  const code = document.getElementById('my-code').textContent;
  navigator.clipboard?.writeText(code);
  document.getElementById('my-code').textContent = '✓ COPIED';
  setTimeout(() => document.getElementById('my-code').textContent = code, 1200);
});

document.getElementById('code-input').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
});

// ── Connection ─────────────────────────────────────────────

function setupConn(isHost) {
  conn.on('open', () => {
    myName = document.getElementById('name-input').value.trim() || (isHost ? 'Player 1' : 'Player 2');
    conn.send({ type: 'hello', name: myName, color: myColor });
    setStatus('Connected! Starting…');
  });

  conn.on('data', data => {
    switch (data.type) {
      case 'hello':
        theirName  = data.name;
        theirColor = data.color;
        if (!inGame) startGame();
        break;

      case 'pos':
        them.x = data.x;
        them.y = data.y;
        break;

      case 'bullet':
        // They fired a bullet — add to theirBullets for rendering
        theirBullets.push({ x: data.x, y: data.y, vx: data.vx, vy: data.vy, id: data.id });
        break;

      case 'bullet_remove':
        theirBullets = theirBullets.filter(b => b.id !== data.id);
        break;

      case 'hit':
        // They say their bullet hit me — I trust it, apply damage
        me.hp = Math.max(0, me.hp - BULLET_DMG);
        myFlash = 8;
        updateHUD();
        if (me.hp <= 0) handleDeath(false);
        break;

      case 'melee_swing':
        // Their swing animation — just render it
        theirSwings.push({ cx: data.cx, cy: data.cy, angle: data.angle, frame: 0 });
        break;

      case 'melee_hit':
        // Their melee hit me
        me.hp = Math.max(0, me.hp - MELEE_DMG);
        myFlash = 12;
        updateHUD();
        if (me.hp <= 0) handleDeath(false);
        break;

      case 'rematch':
        theyWantRematch = true;
        checkRematch();
        break;

      case 'restart':
        // Both agreed — reset everything
        resetGame();
        break;
    }
  });

  conn.on('close', () => {
    inGame = false;
    cancelAnimationFrame(animFrame);
    setStatus('Opponent disconnected.');
    showLobby();
  });

  conn.on('error', () => {
    setStatus('Connection error.');
    showLobby();
  });
}

// ── Game lifecycle ─────────────────────────────────────────

function startGame() {
  resetState();
  inGame = true;

  document.getElementById('hud-name-me').textContent   = (myName || 'You') + ' (you)';
  document.getElementById('hud-name-them').textContent = theirName || 'Opponent';
  document.getElementById('hp-fill-me').style.background   = myColor;
  document.getElementById('hp-fill-them').style.background = theirColor;
  updateHUD();

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('arena').style.display = 'flex';
  hideOverlay();
  loop();
}

function resetState() {
  me.x = myColor === COLORS[0] ? 80 : W - 80 - SQ;
  me.y = H / 2 - SQ / 2;
  me.hp = MAX_HP;
  them.x = myColor === COLORS[0] ? W - 80 - SQ : 80;
  them.y = H / 2 - SQ / 2;
  them.hp = MAX_HP;
  myBullets = [];
  theirBullets = [];
  mySwings = []; theirSwings = [];
  dashTrails = [];
  myFlash = 0; theirFlash = 0;
  lastDash = 0; lastMelee = 0;
  wantsRematch = false; theyWantRematch = false;
}

function resetGame() {
  cancelAnimationFrame(animFrame);
  resetState();
  updateHUD();
  hideOverlay();
  inGame = true;
  loop();
}

function showLobby() {
  document.getElementById('arena').style.display  = 'none';
  document.getElementById('lobby').style.display  = 'flex';
  document.getElementById('join-btn').disabled = false;
}

function handleDeath(iWon) {
  inGame = false;
  cancelAnimationFrame(animFrame);
  const title = iWon ? 'You win!' : 'You died';
  const sub   = iWon ? (theirName || 'Opponent') + ' has been defeated' : 'Defeated by ' + (theirName || 'opponent');
  showOverlay(title, sub);
}

function showOverlay(title, sub) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-sub').textContent   = sub;
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('rematch-btn').addEventListener('click', () => {
  wantsRematch = true;
  document.getElementById('rematch-btn').textContent = 'Waiting…';
  document.getElementById('rematch-btn').disabled = true;
  conn && conn.send({ type: 'rematch' });
  checkRematch();
});

function checkRematch() {
  if (wantsRematch && theyWantRematch) {
    // Both want rematch — host sends the restart signal
    if (myColor === COLORS[0]) {
      conn && conn.send({ type: 'restart' });
    }
    resetGame();
    document.getElementById('rematch-btn').textContent = 'Rematch';
    document.getElementById('rematch-btn').disabled = false;
  } else if (theyWantRematch && !wantsRematch) {
    document.getElementById('overlay-sub').textContent = (theirName || 'Opponent') + ' wants a rematch!';
  }
}

// ── Main loop ──────────────────────────────────────────────

function loop() {
  if (!inGame) return;
  update();
  render();
  animFrame = requestAnimationFrame(loop);
}

function update() {
  const now = Date.now();

  // Movement
  let moved = false;
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup'])    { dy = -1; }
  if (keys['s'] || keys['arrowdown'])  { dy =  1; }
  if (keys['a'] || keys['arrowleft'])  { dx = -1; }
  if (keys['d'] || keys['arrowright']) { dx =  1; }

  if (dx !== 0 || dy !== 0) {
    me.x = Math.max(0, Math.min(W - SQ, me.x + dx * SPEED));
    me.y = Math.max(0, Math.min(H - SQ, me.y + dy * SPEED));
    moved = true;
  }

  if (moved && now - lastSend > 33 && conn && conn.open) {
    conn.send({ type: 'pos', x: me.x, y: me.y });
    lastSend = now;
  }

  // Firing — left click or space
  if ((keys[' '] || keys['mousedown']) && now - lastFire > FIRE_COOLDOWN) {
    fire();
    lastFire = now;
  }

  // Move my bullets + hit detection
  for (let i = myBullets.length - 1; i >= 0; i--) {
    const b = myBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      myBullets.splice(i, 1);
      conn && conn.send({ type: 'bullet_remove', id: b.id });
      continue;
    }
    if (b.x + BULLET_R > them.x && b.x - BULLET_R < them.x + SQ &&
        b.y + BULLET_R > them.y && b.y - BULLET_R < them.y + SQ) {
      myBullets.splice(i, 1);
      conn && conn.send({ type: 'bullet_remove', id: b.id });
      conn && conn.send({ type: 'hit' });
      them.hp = Math.max(0, them.hp - BULLET_DMG);
      theirFlash = 8;
      updateHUD();
      if (them.hp <= 0) handleDeath(true);
      continue;
    }
  }

  // Move their bullets (visual only)
  for (let i = theirBullets.length - 1; i >= 0; i--) {
    const b = theirBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      theirBullets.splice(i, 1);
    }
  }

  // Tick my swings + melee hit detection
  for (let i = mySwings.length - 1; i >= 0; i--) {
    const s = mySwings[i];
    s.frame++;
    // Hit detection in the active window (frames 2–6)
    if (!s.hit && s.frame >= 2 && s.frame <= 6) {
      const tcx = them.x + SQ / 2, tcy = them.y + SQ / 2;
      const ddx = tcx - s.cx, ddy = tcy - s.cy;
      const dist = Math.sqrt(ddx * ddx + ddy * ddy);
      if (dist < MELEE_RANGE + SQ / 2) {
        const angle = Math.atan2(ddy, ddx);
        let diff = angle - s.angle;
        while (diff > Math.PI)  diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        if (Math.abs(diff) < MELEE_ARC / 2) {
          s.hit = true;
          conn && conn.send({ type: 'melee_hit' });
          them.hp = Math.max(0, them.hp - MELEE_DMG);
          theirFlash = 12;
          updateHUD();
          if (them.hp <= 0) handleDeath(true);
        }
      }
    }
    if (s.frame >= MELEE_FRAMES) mySwings.splice(i, 1);
  }

  // Tick their swings (visual only)
  for (let i = theirSwings.length - 1; i >= 0; i--) {
    theirSwings[i].frame++;
    if (theirSwings[i].frame >= MELEE_FRAMES) theirSwings.splice(i, 1);
  }

  // Fade dash trails
  for (let i = dashTrails.length - 1; i >= 0; i--) {
    dashTrails[i].alpha -= 0.08;
    if (dashTrails[i].alpha <= 0) dashTrails.splice(i, 1);
  }

  // Tick flash
  if (myFlash > 0)    myFlash--;
  if (theirFlash > 0) theirFlash--;
}

function fire() {
  const cx = me.x + SQ / 2;
  const cy = me.y + SQ / 2;
  const dx = mouse.x - cx;
  const dy = mouse.y - cy;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len === 0) return;
  const id = ++bulletIdCounter;
  const b = { x: cx, y: cy, vx: (dx / len) * BULLET_SPEED, vy: (dy / len) * BULLET_SPEED, id };
  myBullets.push(b);
  conn && conn.send({ type: 'bullet', x: b.x, y: b.y, vx: b.vx, vy: b.vy, id: b.id });
}

function dash(dx, dy) {
  // Default to mouse direction if not moving
  let nx = dx, ny = dy;
  if (nx === 0 && ny === 0) {
    const cx = me.x + SQ / 2, cy = me.y + SQ / 2;
    const mdx = mouse.x - cx, mdy = mouse.y - cy;
    const mlen = Math.sqrt(mdx * mdx + mdy * mdy);
    if (mlen === 0) return;
    nx = mdx / mlen; ny = mdy / mlen;
  } else {
    const dlen = Math.sqrt(nx * nx + ny * ny);
    nx /= dlen; ny /= dlen;
  }
  // Leave ghost at current position
  dashTrails.push({ x: me.x, y: me.y, alpha: 0.6, color: myColor });
  me.x = Math.max(0, Math.min(W - SQ, me.x + nx * DASH_DIST));
  me.y = Math.max(0, Math.min(H - SQ, me.y + ny * DASH_DIST));
  // Immediately broadcast new position
  conn && conn.send({ type: 'pos', x: me.x, y: me.y });
}

function melee() {
  const cx = me.x + SQ / 2, cy = me.y + SQ / 2;
  const dx = mouse.x - cx, dy = mouse.y - cy;
  const len = Math.sqrt(dx * dx + dy * dy);
  const angle = len === 0 ? 0 : Math.atan2(dy, dx);
  const swing = { cx, cy, angle, frame: 0, hit: false };
  mySwings.push(swing);
  conn && conn.send({ type: 'melee_swing', cx, cy, angle });
}

// ── Render ─────────────────────────────────────────────────

function render() {
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= W; x += 50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Dash ghost trails
  for (const t of dashTrails) {
    ctx.globalAlpha = t.alpha * 0.5;
    ctx.fillStyle = t.color;
    rrect(t.x, t.y, SQ, SQ, 4);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Their bullets
  for (const b of theirBullets) drawBullet(b, theirColor);
  // My bullets
  for (const b of myBullets)    drawBullet(b, myColor);

  // Melee swings
  for (const s of theirSwings) drawSwing(s, theirColor);
  for (const s of mySwings)    drawSwing(s, myColor);

  drawSquare(them, theirColor, theirName || 'Opponent', false, theirFlash > 0);
  drawSquare(me,   myColor,    myName    || 'You',      true,  myFlash > 0);

  // Aim line + crosshair
  const cx = me.x + SQ / 2;
  const cy = me.y + SQ / 2;
  const dx = mouse.x - cx;
  const dy = mouse.y - cy;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len > 0 && inGame) {
    const nx = dx / len, ny = dy / len;
    const lineStart = SQ / 2 + 4, lineEnd = lineStart + 22;
    ctx.beginPath();
    ctx.moveTo(cx + nx * lineStart, cy + ny * lineStart);
    ctx.lineTo(cx + nx * lineEnd,   cy + ny * lineEnd);
    ctx.strokeStyle = myColor;
    ctx.globalAlpha = 0.6;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = myColor;
    ctx.globalAlpha = 0.35;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Cooldown pips (bottom-left of canvas)
  drawCooldownPip(16, H - 16, 'DASH', lastDash, DASH_COOLDOWN, '#aaffcc');
  drawCooldownPip(16, H - 36, 'MELEE', lastMelee, MELEE_COOLDOWN, '#ffaacc');
}

function drawBullet(b, color) {
  ctx.beginPath();
  ctx.arc(b.x, b.y, BULLET_R, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawSwing(s, color) {
  const progress = s.frame / MELEE_FRAMES;
  const alpha = progress < 0.5 ? progress * 2 : 1 - (progress - 0.5) * 2;
  // Arc sweeps from -MELEE_ARC/2 to +MELEE_ARC/2 around the swing angle
  const startAngle = s.angle - MELEE_ARC / 2;
  const endAngle   = s.angle + MELEE_ARC / 2;
  ctx.beginPath();
  ctx.moveTo(s.cx, s.cy);
  ctx.arc(s.cx, s.cy, MELEE_RANGE, startAngle, endAngle);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.globalAlpha = alpha * 0.25;
  ctx.fill();
  // Outer arc stroke
  ctx.beginPath();
  ctx.arc(s.cx, s.cy, MELEE_RANGE, startAngle, endAngle);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.globalAlpha = alpha * 0.7;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawCooldownPip(x, y, label, lastUsed, cooldown, color) {
  const now = Date.now();
  const elapsed = now - lastUsed;
  const ready = elapsed >= cooldown;
  ctx.font = '9px Courier New';
  ctx.textAlign = 'left';
  ctx.fillStyle = ready ? color : '#333';
  ctx.fillText(label, x, y);
  // Small bar
  const bw = 36, bh = 3;
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x, y + 3, bw, bh);
  if (!ready) {
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.6;
    ctx.fillRect(x, y + 3, bw * Math.min(elapsed / cooldown, 1), bh);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.4;
    ctx.fillRect(x, y + 3, bw, bh);
    ctx.globalAlpha = 1;
  }
}

function drawSquare(p, color, name, isMe, flashing) {
  const drawColor = flashing ? '#ff3333' : color;

  if (isMe) {
    ctx.shadowColor = drawColor;
    ctx.shadowBlur = 14;
  }
  ctx.fillStyle = drawColor;
  ctx.globalAlpha = isMe ? 1 : 0.85;
  rrect(p.x, p.y, SQ, SQ, 4);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // Name
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillStyle = isMe ? '#fff' : '#999';
  ctx.fillText(name, p.x + SQ / 2, p.y - 6);

  if (isMe) {
    ctx.fillStyle = drawColor;
    ctx.font = '8px Courier New';
    ctx.fillText('▲', p.x + SQ / 2, p.y - 15);
  }
}

function updateHUD() {
  const mePct   = (me.hp   / MAX_HP) * 100;
  const themPct = (them.hp / MAX_HP) * 100;

  document.getElementById('hp-fill-me').style.width   = mePct   + '%';
  document.getElementById('hp-fill-them').style.width = themPct + '%';
  document.getElementById('hp-text-me').textContent   = me.hp   + ' HP';
  document.getElementById('hp-text-them').textContent = them.hp + ' HP';

  // Color hp bar red when low
  document.getElementById('hp-fill-me').style.background   = me.hp   < 30 ? '#ff3333' : myColor;
  document.getElementById('hp-fill-them').style.background = them.hp < 30 ? '#ff3333' : theirColor;
}

function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── Controls ───────────────────────────────────────────────

document.getElementById('disconnect-btn').addEventListener('click', () => {
  inGame = false;
  cancelAnimationFrame(animFrame);
  if (conn) conn.close();
  showLobby();
  setStatus('Disconnected.');
});

window.addEventListener('beforeunload', () => { if (conn) try { conn.close(); } catch {} });
function setStatus(msg) { document.getElementById('status').textContent = msg; }

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  // Shift dash — one-shot on keydown
  if (e.key === 'Shift' && inGame) {
    const now = Date.now();
    if (now - lastDash > DASH_COOLDOWN) {
      let dx = 0, dy = 0;
      if (keys['w'] || keys['arrowup'])    dy = -1;
      if (keys['s'] || keys['arrowdown'])  dy =  1;
      if (keys['a'] || keys['arrowleft'])  dx = -1;
      if (keys['d'] || keys['arrowright']) dx =  1;
      dash(dx, dy);
      lastDash = now;
    }
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Mouse aim
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', e => {
  if (e.button === 0) { keys['mousedown'] = true; e.preventDefault(); }
  if (e.button === 2 && inGame) {
    const now = Date.now();
    if (now - lastMelee > MELEE_COOLDOWN) {
      melee();
      lastMelee = now;
    }
    e.preventDefault();
  }
});
canvas.addEventListener('mouseup',    e => { if (e.button === 0) keys['mousedown'] = false; });
canvas.addEventListener('mouseleave', () => { keys['mousedown'] = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
</script>
