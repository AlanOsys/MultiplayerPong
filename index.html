<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Squares</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 0;
  }

  h1 {
    font-size: 22px;
    letter-spacing: 8px;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 380px;
  }

  .card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 18px 20px;
    width: 100%;
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  #my-code {
    font-size: 28px;
    letter-spacing: 6px;
    color: #4eff91;
    text-align: center;
    cursor: pointer;
    user-select: all;
    padding: 10px;
    background: #0a0a0a;
    border: 1px solid #1e1e1e;
    border-radius: 6px;
    transition: border-color 0.15s;
  }

  #my-code:hover { border-color: #4eff91; }

  .hint { font-size: 11px; color: #444; text-align: center; margin-top: 7px; }

  .join-row { display: flex; gap: 8px; }

  .name-row { display: flex; gap: 8px; margin-bottom: 12px; }

  input[type="text"] {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid #1e1e1e;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    color: #fff;
    font-family: 'Courier New', monospace;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: #444; }

  #code-input {
    font-size: 20px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  button {
    background: transparent;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 11px;
    letter-spacing: 2px;
    color: #ccc;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  button:hover:not(:disabled) { background: #1a1a1a; border-color: #555; }
  button:disabled { opacity: 0.3; cursor: default; }

  #status {
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    min-height: 16px;
    text-align: center;
  }

  #arena { display: none; flex-direction: column; align-items: center; gap: 10px; }

  #top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 700px;
    font-size: 11px;
    color: #444;
    letter-spacing: 1px;
  }

  canvas {
    display: block;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
  }

  #legend {
    display: flex;
    gap: 20px;
    width: 700px;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: #555;
  }

  .swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  #controls-hint { font-size: 11px; color: #2e2e2e; letter-spacing: 1px; }

  #disconnect-btn {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0;
  }

  #disconnect-btn:hover { color: #888; }
</style>
</head>
<body>

<h1>Squares</h1>

<div id="lobby">
  <div class="card">
    <div class="card-label">Your code — share with friend</div>
    <div id="my-code">···</div>
    <p class="hint">Click to copy</p>
  </div>

  <div class="card">
    <div class="card-label">Your name</div>
    <div class="name-row">
      <input type="text" id="name-input" placeholder="Player 1" maxlength="12" value="" />
    </div>
    <div class="card-label">Join friend</div>
    <div class="join-row">
      <input type="text" id="code-input" placeholder="ENTER CODE" maxlength="6" />
      <button id="join-btn" disabled>Connect</button>
    </div>
  </div>

  <div id="status">Connecting to network…</div>
</div>

<div id="arena">
  <div id="top-bar">
    <span id="conn-status">Connected</span>
    <button id="disconnect-btn">Disconnect</button>
  </div>
  <canvas id="canvas" width="700" height="500"></canvas>
  <div id="legend">
    <div class="leg"><div class="swatch" id="swatch-me"></div><span id="label-me">You</span></div>
    <div class="leg"><div class="swatch" id="swatch-them"></div><span id="label-them">Opponent</span></div>
  </div>
  <div id="controls-hint">WASD or arrow keys to move</div>
</div>

<script>
const W = 700, H = 500, SQ = 28, SPEED = 3;

const COLORS = ['#4eff91', '#4eb8ff', '#ff4e91', '#ffd04e', '#c04eff', '#ff884e', '#4effee', '#b8ff4e'];

let peer, conn;
let myColor, theirColor;
let myName, theirName;

let me    = { x: 80,       y: H / 2 - SQ / 2 };
let them  = { x: W - 80 - SQ, y: H / 2 - SQ / 2 };

let keys = {};
let animFrame;
let lastSend = 0;
let inGame = false;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ── PeerJS ────────────────────────────────────────────────

function makeCode() {
  return Math.random().toString(36).substr(2, 6).toUpperCase();
}

const peerConfig = {
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:global.stun.twilio.com:3478' }
    ]
  }
};

peer = new Peer(makeCode(), peerConfig);

peer.on('open', id => {
  document.getElementById('my-code').textContent = id;
  document.getElementById('join-btn').disabled = false;
  setStatus('Ready — share your code or enter a friend\'s');
});

peer.on('error', e => setStatus('Error: ' + e.type));

// Host receives connection
peer.on('connection', c => {
  conn = c;
  myColor    = COLORS[0];
  theirColor = COLORS[1];
  setupConn(true);
});

// Guest connects
document.getElementById('join-btn').addEventListener('click', () => {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  if (!code) return;
  setStatus('Connecting to ' + code + '…');
  document.getElementById('join-btn').disabled = true;
  conn = peer.connect(code, { reliable: false, serialization: 'json' });
  myColor    = COLORS[1];
  theirColor = COLORS[0];
  setupConn(false);
});

document.getElementById('my-code').addEventListener('click', () => {
  const code = document.getElementById('my-code').textContent;
  navigator.clipboard?.writeText(code);
  document.getElementById('my-code').textContent = '✓ COPIED';
  setTimeout(() => document.getElementById('my-code').textContent = code, 1200);
});

document.getElementById('code-input').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
});

// ── Connection ────────────────────────────────────────────

function setupConn(isHost) {
  conn.on('open', () => {
    myName = document.getElementById('name-input').value.trim() || (isHost ? 'Player 1' : 'Player 2');

    // Exchange names and colors
    conn.send({ type: 'hello', name: myName, color: myColor });
    setStatus('Connected! Starting…');
  });

  conn.on('data', data => {
    if (data.type === 'hello') {
      theirName  = data.name;
      theirColor = data.color;   // let their hello override if needed
      if (!inGame) startGame();
    }
    if (data.type === 'pos') {
      them.x = data.x;
      them.y = data.y;
    }
  });

  conn.on('close', () => {
    inGame = false;
    cancelAnimationFrame(animFrame);
    setStatus('Opponent disconnected.');
    showLobby();
  });

  conn.on('error', () => {
    setStatus('Connection error.');
    showLobby();
  });
}

// ── Game ──────────────────────────────────────────────────

function startGame() {
  inGame = true;

  me.x    = myColor === COLORS[0] ? 80 : W - 80 - SQ;
  me.y    = H / 2 - SQ / 2;
  them.x  = myColor === COLORS[0] ? W - 80 - SQ : 80;
  them.y  = H / 2 - SQ / 2;

  document.getElementById('swatch-me').style.background    = myColor;
  document.getElementById('swatch-them').style.background  = theirColor;
  document.getElementById('label-me').textContent          = (myName   || 'You') + ' (you)';
  document.getElementById('label-them').textContent        = theirName || 'Opponent';

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('arena').style.display = 'flex';

  loop();
}

function showLobby() {
  document.getElementById('arena').style.display  = 'none';
  document.getElementById('lobby').style.display  = 'flex';
  document.getElementById('join-btn').disabled = false;
}

function loop() {
  if (!inGame) return;
  update();
  render();
  animFrame = requestAnimationFrame(loop);
}

function update() {
  let moved = false;
  if (keys['w'] || keys['arrowup'])    { me.y = Math.max(0, me.y - SPEED); moved = true; }
  if (keys['s'] || keys['arrowdown'])  { me.y = Math.min(H - SQ, me.y + SPEED); moved = true; }
  if (keys['a'] || keys['arrowleft'])  { me.x = Math.max(0, me.x - SPEED); moved = true; }
  if (keys['d'] || keys['arrowright']) { me.x = Math.min(W - SQ, me.x + SPEED); moved = true; }

  if (moved) {
    const now = Date.now();
    if (now - lastSend > 33 && conn && conn.open) {
      conn.send({ type: 'pos', x: me.x, y: me.y });
      lastSend = now;
    }
  }
}

function render() {
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= W; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  drawSquare(me,   myColor,    myName   || 'You',       true);
  drawSquare(them, theirColor, theirName || 'Opponent',  false);
}

function drawSquare(p, color, name, isMe) {
  if (isMe) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 14;
  }
  ctx.fillStyle = color;
  ctx.globalAlpha = isMe ? 1 : 0.8;
  rrect(p.x, p.y, SQ, SQ, 4);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillStyle = isMe ? '#fff' : '#999';
  ctx.fillText(name, p.x + SQ / 2, p.y - 6);

  if (isMe) {
    ctx.fillStyle = color;
    ctx.font = '8px Courier New';
    ctx.fillText('▲', p.x + SQ / 2, p.y - 15);
  }
}

function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

document.getElementById('disconnect-btn').addEventListener('click', () => {
  inGame = false;
  cancelAnimationFrame(animFrame);
  if (conn) conn.close();
  showLobby();
  setStatus('Disconnected.');
});

window.addEventListener('beforeunload', () => { if (conn) try { conn.close(); } catch {} });

function setStatus(msg) { document.getElementById('status').textContent = msg; }

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
</script>
</body>
</html>
