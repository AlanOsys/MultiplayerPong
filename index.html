<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Pong</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
  }

  h1 { font-size: 28px; letter-spacing: 6px; color: #fff; text-transform: uppercase; }

  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }

  .card {
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 20px 24px;
    width: 100%;
  }

  .card h2 { font-size: 13px; letter-spacing: 3px; color: #888; margin-bottom: 12px; text-transform: uppercase; }

  #my-id {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 22px;
    letter-spacing: 4px;
    color: #4eff91;
    text-align: center;
    cursor: pointer;
    user-select: all;
    width: 100%;
    font-family: 'Courier New', monospace;
  }

  #my-id:hover { border-color: #4eff91; }

  .hint { font-size: 11px; color: #555; text-align: center; margin-top: 6px; }

  .join-row { display: flex; gap: 8px; }

  input {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 20px;
    letter-spacing: 4px;
    color: #fff;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    outline: none;
  }

  input:focus { border-color: #4eff91; }

  button {
    background: #4eff91;
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    font-family: 'Courier New', monospace;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: default; }

  #status { font-size: 13px; color: #888; text-align: center; min-height: 18px; }

  #game { display: none; flex-direction: column; align-items: center; gap: 10px; }

  #scores {
    display: flex;
    gap: 60px;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .score-label { font-size: 11px; color: #555; text-align: center; letter-spacing: 2px; margin-bottom: 2px; }

  canvas {
    border: 1px solid #333;
    border-radius: 4px;
    display: block;
  }

  #game-status { font-size: 13px; color: #888; letter-spacing: 1px; }

  #controls { font-size: 11px; color: #444; letter-spacing: 1px; }
</style>
</head>
<body>

<h1>Pong</h1>

<div id="lobby">
  <div class="card">
    <h2>Your Game ID</h2>
    <div id="my-id">···</div>
    <p class="hint">Click to copy — share this with your opponent</p>
  </div>

  <div class="card">
    <h2>Join a Game</h2>
    <div class="join-row">
      <input id="peer-input" placeholder="ENTER ID" maxlength="4" />
      <button id="join-btn" disabled>Join</button>
    </div>
  </div>

  <div id="status">Connecting to network…</div>
</div>

<div id="game">
  <div>
    <div class="score-label">YOU &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; THEM</div>
    <div id="scores">
      <span id="score-me">0</span>
      <span id="score-them">0</span>
    </div>
  </div>
  <canvas id="canvas" width="600" height="400"></canvas>
  <div id="game-status"></div>
  <div id="controls">W / S or ↑ / ↓ to move your paddle</div>
</div>

<script>
const W = 600, H = 400, PADDLE_W = 12, PADDLE_H = 80, BALL_SIZE = 10, PADDLE_SPEED = 5;

let peer, conn, myId, isHost = false;
let gameRunning = false;

// Game state (host is authoritative)
let state = {
  ball: { x: W/2, y: H/2, vx: 3, vy: 2 },
  p1: { y: H/2 - PADDLE_H/2 },  // host = left
  p2: { y: H/2 - PADDLE_H/2 },  // guest = right
  score: { p1: 0, p2: 0 }
};

let myPaddleY = H/2 - PADDLE_H/2;
let keys = {};
let animFrame;

// ── PeerJS setup ──────────────────────────────────────────
function generateId() {
  return Math.random().toString(36).substr(2, 4).toUpperCase();
}

const peerConfig = {
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:global.stun.twilio.com:3478' }
    ]
  }
};

peer = new Peer(generateId(), peerConfig);

peer.on('open', id => {
  myId = id;
  document.getElementById('my-id').textContent = id;
  document.getElementById('join-btn').disabled = false;
  setStatus('Ready — share your ID or enter a friend\'s');
});

peer.on('error', e => setStatus('Error: ' + e.type));

peer.on('connection', c => {
  conn = c;
  isHost = true;
  setupConn();
  setStatus('Opponent connected! Starting…');
  setTimeout(startGame, 800);
});

document.getElementById('join-btn').addEventListener('click', () => {
  const id = document.getElementById('peer-input').value.trim().toUpperCase();
  if (!id || id === myId) return;
  setStatus('Connecting to ' + id + '…');
  conn = peer.connect(id, { reliable: false });
  isHost = false;
  setupConn();
});

document.getElementById('my-id').addEventListener('click', () => {
  navigator.clipboard?.writeText(myId);
  document.getElementById('my-id').textContent = '✓ COPIED';
  setTimeout(() => document.getElementById('my-id').textContent = myId, 1200);
});

document.getElementById('peer-input').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
});

function setupConn() {
  conn.on('open', () => {
    if (!isHost) {
      setStatus('Connected! Waiting for host…');
    }
  });

  conn.on('data', data => {
    if (data.type === 'state' && !isHost) {
      state = data.state;
      updateScoreUI();
      renderFrame();
    }
    if (data.type === 'paddle' && isHost) {
      state.p2.y = data.y;
    }
    if (data.type === 'paddle' && !isHost) {
      // guest receives full state, not needed
    }
    if (data.type === 'start') {
      startGame();
    }
  });

  conn.on('close', () => {
    setStatus('Opponent disconnected.');
    stopGame();
    showLobby();
  });
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ── Game ──────────────────────────────────────────────────
function startGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  gameRunning = true;

  if (!isHost) {
    conn.send({ type: 'start' });
  }

  resetBall();
  if (isHost) loop();
  else guestLoop();
}

function stopGame() {
  gameRunning = false;
  if (animFrame) cancelAnimationFrame(animFrame);
}

function showLobby() {
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('game').style.display = 'none';
}

function resetBall() {
  const dir = Math.random() > 0.5 ? 1 : -1;
  state.ball = {
    x: W/2, y: H/2,
    vx: (3 + Math.random()) * dir,
    vy: (2 + Math.random()) * (Math.random() > 0.5 ? 1 : -1)
  };
}

// Host runs the physics loop
function loop() {
  if (!gameRunning) return;
  handleInput();
  physics();
  sendState();
  renderFrame();
  animFrame = requestAnimationFrame(loop);
}

// Guest just sends paddle pos and renders from received state
function guestLoop() {
  if (!gameRunning) return;
  handleInput();
  if (conn && conn.open) {
    conn.send({ type: 'paddle', y: myPaddleY });
  }
  animFrame = requestAnimationFrame(guestLoop);
}

function handleInput() {
  const paddleKey = isHost ? 'p1' : 'p2';
  if (keys['w'] || keys['arrowup']) myPaddleY = Math.max(0, myPaddleY - PADDLE_SPEED);
  if (keys['s'] || keys['arrowdown']) myPaddleY = Math.min(H - PADDLE_H, myPaddleY + PADDLE_SPEED);

  if (isHost) state.p1.y = myPaddleY;
  else state.p2.y = myPaddleY;
}

function physics() {
  const b = state.ball;
  b.x += b.vx;
  b.y += b.vy;

  // Wall bounce
  if (b.y <= 0 || b.y + BALL_SIZE >= H) b.vy *= -1;

  // Paddle collision - P1 (left)
  if (b.x <= PADDLE_W + 10 && b.y + BALL_SIZE >= state.p1.y && b.y <= state.p1.y + PADDLE_H) {
    b.vx = Math.abs(b.vx) * 1.05;
    const hit = (b.y + BALL_SIZE/2 - (state.p1.y + PADDLE_H/2)) / (PADDLE_H/2);
    b.vy = hit * 5;
  }

  // Paddle collision - P2 (right)
  if (b.x + BALL_SIZE >= W - PADDLE_W - 10 && b.y + BALL_SIZE >= state.p2.y && b.y <= state.p2.y + PADDLE_H) {
    b.vx = -Math.abs(b.vx) * 1.05;
    const hit = (b.y + BALL_SIZE/2 - (state.p2.y + PADDLE_H/2)) / (PADDLE_H/2);
    b.vy = hit * 5;
  }

  // Cap speed
  b.vx = Math.max(-12, Math.min(12, b.vx));
  b.vy = Math.max(-10, Math.min(10, b.vy));

  // Score
  if (b.x < 0) { state.score.p2++; updateScoreUI(); resetBall(); }
  if (b.x > W) { state.score.p1++; updateScoreUI(); resetBall(); }
}

function sendState() {
  if (conn && conn.open) {
    conn.send({ type: 'state', state });
  }
}

function updateScoreUI() {
  document.getElementById('score-me').textContent  = isHost ? state.score.p1 : state.score.p2;
  document.getElementById('score-them').textContent = isHost ? state.score.p2 : state.score.p1;
}

// ── Render ────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function renderFrame() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Center line
  ctx.setLineDash([6, 8]);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  // Paddles
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  roundRect(ctx, 10, state.p1.y, PADDLE_W, PADDLE_H, 4);
  ctx.fill();

  ctx.beginPath();
  roundRect(ctx, W - 10 - PADDLE_W, state.p2.y, PADDLE_W, PADDLE_H, 4);
  ctx.fill();

  // Ball
  ctx.fillStyle = '#4eff91';
  ctx.beginPath();
  ctx.roundRect(state.ball.x, state.ball.y, BALL_SIZE, BALL_SIZE, 3);
  ctx.fill();

  // Role label
  ctx.fillStyle = '#333';
  ctx.font = '10px Courier New';
  ctx.fillText(isHost ? 'YOU' : '', 16, 14);
  ctx.fillText(isHost ? '' : 'YOU', W - 36, 14);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Input ─────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
</script>
</body>
</html>
